<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Fused RMSNorm + Residual + QKV — unfused vs fused memory flow -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <style>
    .hbm { fill:#fee2e2; stroke:#dc2626; stroke-width:1.5; }
    .reg { fill:#dcfce7; stroke:#16a34a; stroke-width:1.5; }
    .k   { fill:#e0e7ff; stroke:#4338ca; stroke-width:1.5; }
    .kf  { fill:#fef9c3; stroke:#a16207; stroke-width:1.5; }
    .lbl { font-size:13px; fill:#0f172a; }
    .sub { font-size:11px; fill:#475569; }
    .title { font-size:17px; font-weight:600; fill:#0f172a; }
    .arrow { stroke:#334155; stroke-width:1.6; fill:none; }
    .arrowG { stroke:#16a34a; stroke-width:1.8; fill:none; }
    .badge { font-size:10px; fill:#6b7280; }
    .headline { font-size:12px; font-weight:600; fill:#16a34a; }
    .headlineR { font-size:12px; font-weight:600; fill:#dc2626; }
  </style>

  <!-- ======================= UNFUSED (top) ======================= -->
  <text x="40" y="34" class="title">Unfused: 3 CUDA kernels, 2 intermediate HBM round-trips</text>

  <!-- HBM tensors row -->
  <rect class="hbm" x="40"  y="70" width="90" height="44" rx="6"/>
  <text x="85" y="89"  text-anchor="middle" class="lbl">x</text>
  <text x="85" y="104" text-anchor="middle" class="sub">(B,S,H) HBM</text>

  <rect class="hbm" x="40"  y="128" width="90" height="44" rx="6"/>
  <text x="85" y="147" text-anchor="middle" class="lbl">residual</text>
  <text x="85" y="162" text-anchor="middle" class="sub">(B,S,H) HBM</text>

  <!-- Kernel 1: add -->
  <rect class="k" x="180" y="86" width="100" height="70" rx="6"/>
  <text x="230" y="111" text-anchor="middle" class="lbl">kernel 1</text>
  <text x="230" y="130" text-anchor="middle" class="sub">add</text>
  <text x="230" y="146" text-anchor="middle" class="sub">x + r</text>

  <!-- HBM write: hidden -->
  <rect class="hbm" x="320" y="99" width="110" height="44" rx="6"/>
  <text x="375" y="118" text-anchor="middle" class="lbl">hidden</text>
  <text x="375" y="133" text-anchor="middle" class="sub">write → HBM → read</text>

  <!-- Kernel 2: norm -->
  <rect class="k" x="470" y="86" width="100" height="70" rx="6"/>
  <text x="520" y="111" text-anchor="middle" class="lbl">kernel 2</text>
  <text x="520" y="130" text-anchor="middle" class="sub">RMSNorm</text>
  <text x="520" y="146" text-anchor="middle" class="sub">* gain</text>

  <!-- HBM write: normed -->
  <rect class="hbm" x="610" y="99" width="110" height="44" rx="6"/>
  <text x="665" y="118" text-anchor="middle" class="lbl">normed</text>
  <text x="665" y="133" text-anchor="middle" class="sub">write → HBM → read</text>

  <!-- Kernel 3: matmul -->
  <rect class="k" x="760" y="86" width="120" height="70" rx="6"/>
  <text x="820" y="111" text-anchor="middle" class="lbl">kernel 3</text>
  <text x="820" y="130" text-anchor="middle" class="sub">cuBLAS GEMM</text>
  <text x="820" y="146" text-anchor="middle" class="sub">Q, K, V</text>

  <!-- Arrows (unfused) -->
  <path class="arrow" d="M130,92 L180,100" marker-end="url(#arr)"/>
  <path class="arrow" d="M130,150 L180,142" marker-end="url(#arr)"/>
  <path class="arrow" d="M280,121 L320,121" marker-end="url(#arr)"/>
  <path class="arrow" d="M430,121 L470,121" marker-end="url(#arr)"/>
  <path class="arrow" d="M570,121 L610,121" marker-end="url(#arr)"/>
  <path class="arrow" d="M720,121 L760,121" marker-end="url(#arr)"/>

  <!-- Unfused HBM traffic summary -->
  <text x="40" y="210" class="headlineR">HBM traffic: 3 reads + 2 writes + weight fetch   ·   3 kernel launches</text>

  <!-- ======================= FUSED (bottom) ======================= -->
  <line x1="40" y1="240" x2="880" y2="240" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="40" y="272" class="title">Fused: 1 CUDA kernel, normalized tensor never touches HBM</text>

  <!-- HBM inputs -->
  <rect class="hbm" x="40"  y="310" width="90" height="44" rx="6"/>
  <text x="85" y="329" text-anchor="middle" class="lbl">x</text>
  <text x="85" y="344" text-anchor="middle" class="sub">(B,S,H) HBM</text>

  <rect class="hbm" x="40"  y="368" width="90" height="44" rx="6"/>
  <text x="85" y="387" text-anchor="middle" class="lbl">residual</text>
  <text x="85" y="402" text-anchor="middle" class="sub">optional · HBM</text>

  <!-- The fused kernel: big rounded rect containing registers/L1 path -->
  <rect class="kf" x="180" y="296" width="540" height="140" rx="10"/>
  <text x="450" y="320" text-anchor="middle" class="lbl" font-weight="600">
    Triton kernel: _fused_rmsnorm_residual_qkv_kernel
  </text>

  <!-- registers -->
  <rect class="reg" x="210" y="340" width="140" height="60" rx="6"/>
  <text x="280" y="362" text-anchor="middle" class="lbl">Phase 1</text>
  <text x="280" y="378" text-anchor="middle" class="sub">variance in fp32</text>
  <text x="280" y="392" text-anchor="middle" class="sub">(registers · L1)</text>

  <rect class="reg" x="370" y="340" width="160" height="60" rx="6"/>
  <text x="450" y="362" text-anchor="middle" class="lbl">Phase 2</text>
  <text x="450" y="378" text-anchor="middle" class="sub">normalize · tl.dot</text>
  <text x="450" y="392" text-anchor="middle" class="sub">fp32 acc · tensor core</text>

  <rect class="reg" x="550" y="340" width="150" height="60" rx="6"/>
  <text x="625" y="362" text-anchor="middle" class="lbl">stream W tiles</text>
  <text x="625" y="378" text-anchor="middle" class="sub">(N_OUT, H)</text>
  <text x="625" y="392" text-anchor="middle" class="sub">each read once</text>

  <path class="arrowG" d="M350,370 L370,370" marker-end="url(#arrG)"/>
  <path class="arrowG" d="M530,370 L550,370" marker-end="url(#arrG)"/>

  <!-- HBM output -->
  <rect class="hbm" x="760" y="350" width="120" height="44" rx="6"/>
  <text x="820" y="369" text-anchor="middle" class="lbl">Q · K · V</text>
  <text x="820" y="384" text-anchor="middle" class="sub">(B,S,N_OUT) HBM</text>

  <!-- Arrows (fused) -->
  <path class="arrow" d="M130,332 L180,360" marker-end="url(#arr)"/>
  <path class="arrow" d="M130,390 L180,390" marker-end="url(#arr)"/>
  <path class="arrowG" d="M720,370 L760,370" marker-end="url(#arrG)"/>

  <!-- Fused HBM traffic summary -->
  <text x="40" y="462" class="headline">HBM traffic: 1 read (+1 if residual) + 1 write + weight fetch   ·   1 kernel launch   ·   intermediate tensors stay in L1 / registers</text>
</svg>
